<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniraAI — Brand Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#05080f;color:#cfe0f5;}
input,select,textarea,button{font-family:inherit;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#1a3055;border-radius:3px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/htm@3/dist/htm.js"></script>
<script>
const{useState,useEffect}=React;
const html=htm.bind(React.createElement);

// ── SUPABASE ─────────────────────────────────────────────────
const SB_URL='https://vchtdsfrryxnvceierkn.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZjaHRkc2Zycnl4bnZjZWllcmtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODcyMTYsImV4cCI6MjA5NDA2MzIxNn0.VuPuPqCbVYlxNpeTulkKK-IMezzxg3C05c4kWn3evqo';
const SBH={'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json'};
const db={
  async getSetting(k){try{const r=await fetch(`${SB_URL}/rest/v1/settings?key=eq.${k}&select=value`,{headers:SBH});const d=await r.json();return d[0]?.value||null;}catch{return null;}},
  async setSetting(k,v){try{await fetch(`${SB_URL}/rest/v1/settings`,{method:'POST',headers:{...SBH,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({key:k,value:v,updated_at:new Date().toISOString()})});}catch(e){console.error(e);}},
  async getClients(){try{const r=await fetch(`${SB_URL}/rest/v1/clients?select=*&order=created_at.desc`,{headers:SBH});const d=await r.json();return Array.isArray(d)?d.map(x=>x.data):[];}catch{return[];}},
  async upsertClient(c){try{await fetch(`${SB_URL}/rest/v1/clients`,{method:'POST',headers:{...SBH,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({id:c.id,updated_at:c.updatedAt,status:c.status,data:c})});}catch(e){console.error(e);}},
  async deleteClient(id){try{await fetch(`${SB_URL}/rest/v1/clients?id=eq.${id}`,{method:'DELETE',headers:SBH});}catch(e){console.error(e);}},
};

// ── TOKENS ──────────────────────────────────────────────────
const C={bg:'#05080f',s1:'#0a1020',s2:'#0e1830',s3:'#13213e',bd:'#17304e',bdB:'#1d4070',ac:'#4a86f5',tx:'#cfe0f5',dm:'#5a8ab0',mt:'#274466',ok:'#34d399',wn:'#fbbf24',er:'#f87171',pu:'#a78bfa',tl:'#2dd4bf'};
const inp=(ex={})=>({background:C.s2,border:`0.5px solid ${C.bd}`,borderRadius:6,color:C.tx,padding:'8px 11px',fontSize:13,width:'100%',outline:'none',...ex});
const pbtn=(on,ex={})=>({background:on?C.ac:'transparent',color:on?'#fff':C.tx,border:on?'none':`0.5px solid ${C.bd}`,borderRadius:6,padding:'7px 14px',fontSize:13,cursor:'pointer',...ex});

const INDUSTRIES=['F&B (Food & Beverage)','Beauty & Skincare','Fashion & Apparel','Lifestyle & Wellness','Home & Living','Health & Fitness','E-commerce / Retail','Professional Services','Education & Training','Healthcare & Clinic','Legal & Consulting','Real Estate','Technology & SaaS','Automotive','Travel & Hospitality','Finance & Insurance','Non-profit / NGO','Other'];
const ARCHETYPES=['The Hero','The Creator','The Caregiver','The Rebel','The Sage','The Explorer','The Ruler','The Magician','The Jester','The Lover','The Everyman','The Innocent'];
const TONES=['Professional','Friendly','Playful','Bold','Luxurious','Authoritative','Empathetic','Energetic','Inspirational','Educational','Conversational','Witty','Sincere','Minimalist'];
const PLAT=[{k:'instagram',v:'Instagram'},{k:'tiktok',v:'TikTok'},{k:'facebook',v:'Facebook'},{k:'shopee',v:'Shopee'},{k:'lazada',v:'Lazada'},{k:'linkedin',v:'LinkedIn'},{k:'whatsapp',v:'WhatsApp'},{k:'googleads',v:'Google Ads'},{k:'website',v:'Website/Blog'}];
const FMTS=['Short-form video','Long-form video','Static image','Carousel/slideshow','Stories','Live stream','Email newsletter','WhatsApp broadcast','Blog article'];
const FREQS=['Daily','5–6×/week','3–4×/week','1–2×/week','Campaign-based'];
const AGES=['Under 18','18–24','25–34','35–44','45–54','55–64','65+'];
const INCOMES=['Below RM1,500/mo','RM1,500–3,000/mo','RM3,000–5,000/mo','RM5,000–8,000/mo','RM8,000–12,000/mo','RM12,000–20,000/mo','RM20,000+/mo'];
const GENDERS=['Primarily female','Primarily male','All genders','Mixed (female lean)','Mixed (male lean)'];
const MY_STATES=['Johor','Kedah','Kelantan','Kuala Lumpur (WP)','Labuan (WP)','Melaka','Negeri Sembilan','Pahang','Penang','Perak','Perlis','Putrajaya (WP)','Sabah','Sarawak','Selangor','Terengganu'];
const SALES_CH=['Online – Own website','Online – Shopee','Online – Lazada','Online – TikTok Shop','Online – Instagram Shop','Offline – Own store','Offline – Retail partner','Wholesale / B2B','Pop-up / Events'];
const TABS=['Basics','Brand Voice','Audience','Products','Platforms','Messaging'];
const SCFG={active:{l:'Active',c:C.ok},onboarding:{l:'Onboarding',c:C.wn},paused:{l:'Paused',c:C.mt},deactivated:{l:'Deactivated',c:C.er}};
const CB=()=>({name:'',email:'',phone:'',role:''});
const uid=()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);
const fmtd=d=>d?new Date(d).toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'}):'—';
const blank=()=>({
  id:uid(),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),status:'onboarding',
  basics:{clientName:'',brandName:'',industry:'',industryOther:'',website:'',companyAddress:'',natureOfBusiness:'',productsServicesDesc:'',parentCompany:'',relatedClientTags:[],competitorBrands:[],socialHandles:{instagram:'',tiktok:'',facebook:'',linkedin:'',shopee:'',lazada:''},primaryContact:CB(),secondaryContact:CB(),retainerRM:'',notes:''},
  voice:{tagline:'',colors:['#4a86f5'],personality:[],archetype:'',tones:[],writingStyle:'',dos:[],donts:[],sampleCopy:'',brandCIUrl:'',sampleCreativeUrls:[]},
  audience:{description:'',ageRanges:[],gender:'',countryLocation:'Malaysia',malaysiaStates:[],incomeRanges:[],interests:[],painPoints:[],motivations:[],behavior:''},
  products:[],
  platforms:{active:[],frequency:'',formats:[]},
  messaging:{usp:'',keyMessages:[],competitors:[],differentiation:'',cta:''}
});

// ── STABLE COMPONENTS ────────────────────────────────────────
function TagInput({tags=[],onAdd,onRemove,placeholder}){
  const[v,sv]=useState('');
  return html`<div>
    ${tags.length>0&&html`<div style=${{display:'flex',flexWrap:'wrap',gap:5,marginBottom:6}}>
      ${tags.map((t,i)=>html`<span key=${i} style=${{background:C.s3,border:`0.5px solid ${C.bd}`,borderRadius:4,padding:'2px 8px',fontSize:12,color:C.dm,display:'flex',alignItems:'center',gap:4}}>${t}<span onClick=${()=>onRemove(i)} style=${{cursor:'pointer',color:C.mt,fontSize:16,lineHeight:1,marginLeft:2}}>×</span></span>`)}
    </div>`}
    <input style=${inp()} value=${v} placeholder=${placeholder||'Type and press Enter'} onChange=${e=>sv(e.target.value)} onKeyDown=${e=>{if((e.key==='Enter'||e.key===',')&&v.trim()){e.preventDefault();onAdd(v.trim());sv('');}if(e.key==='Backspace'&&!v&&tags.length>0)onRemove(tags.length-1);}}/>
  </div>`;
}
function Chips({opts=[],selected=[],onToggle}){
  return html`<div style=${{display:'flex',flexWrap:'wrap',gap:6}}>
    ${opts.map(o=>{const k=typeof o==='object'?o.k:o,l=typeof o==='object'?o.v:o,on=selected.includes(k);
      return html`<button key=${k} onClick=${()=>onToggle(k)} style=${{background:on?C.ac:C.s3,color:on?'#fff':C.dm,border:`0.5px solid ${on?C.ac:C.bd}`,borderRadius:20,padding:'4px 12px',fontSize:12,cursor:'pointer'}}>${l}</button>`;
    })}
  </div>`;
}
function SBadge({status}){const c=SCFG[status]||SCFG.onboarding;return html`<span style=${{background:`${c.c}1a`,color:c.c,border:`0.5px solid ${c.c}50`,borderRadius:20,padding:'2px 10px',fontSize:11,fontWeight:500,whiteSpace:'nowrap'}}>${c.l}</span>`;}
function Lb({children}){return html`<div style=${{fontSize:11,color:C.dm,textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:5}}>${children}</div>`;}
function Fd({label,span2,children}){return html`<div style=${{gridColumn:span2?'span 2':'span 1'}}><${Lb}>${label}</${Lb}>${children}</div>`;}
function Sec({t,children}){return html`<div style=${{marginBottom:22}}><div style=${{fontSize:11,color:C.ac,textTransform:'uppercase',letterSpacing:'1px',marginBottom:12,paddingBottom:7,borderBottom:`0.5px solid ${C.bd}`}}>${t}</div>${children}</div>`;}
function Row({l,v}){return v?html`<div style=${{display:'flex',gap:10,marginBottom:7,fontSize:13}}><div style=${{color:C.dm,minWidth:150,flexShrink:0}}>${l}</div><div style=${{color:C.tx,lineHeight:1.5,wordBreak:'break-all'}}>${v}</div></div>`:null;}
function Tags({items}){return items?.length?html`<div style=${{display:'flex',flexWrap:'wrap',gap:5}}>${items.map((t,i)=>html`<span key=${i} style=${{background:C.s3,border:`0.5px solid ${C.bd}`,borderRadius:4,padding:'2px 9px',fontSize:12,color:C.dm}}>${t}</span>`)}</div>`:html`<span style=${{color:C.mt,fontSize:12}}>Not set</span>`;}
function Card({style={},children}){return html`<div style=${{background:C.s1,border:`0.5px solid ${C.bd}`,borderRadius:10,...style}}>${children}</div>`;}
function Hint({children}){return html`<div style=${{fontSize:11,color:C.mt,marginTop:4,lineHeight:1.5}}>${children}</div>`;}
function Spinner(){return html`<div style=${{display:'flex',alignItems:'center',justifyContent:'center',gap:10,padding:'20px',color:C.dm,fontSize:13}}><div style=${{width:18,height:18,border:`2px solid ${C.bd}`,borderTop:`2px solid ${C.ac}`,borderRadius:'50%',animation:'spin 0.8s linear infinite'}}></div>Loading from Supabase…</div>`;} 

// ── MAIN APP ─────────────────────────────────────────────────
function App(){
  const[locked,setLocked]=useState(true);
  const[pmode,setPmode]=useState('check');
  const[pin,setPin]=useState('');const[pin2,setPin2]=useState('');
  const[pErr,setPErr]=useState('');const[savedPin,setSavedPin]=useState(null);
  const[clients,setClients]=useState([]);
  const[loading,setLoading]=useState(true);
  const[view,setView]=useState('dash');
  const[ed,setEd]=useState(null);
  const[det,setDet]=useState(null);
  const[tab,setTab]=useState(0);
  const[srch,setSrch]=useState('');
  const[sfilt,setSfilt]=useState('all');
  const[saving,setSaving]=useState(false);
  const[copied,setCopied]=useState(false);
  const[toast,setToast]=useState('');

  useEffect(()=>{(async()=>{
    const p=await db.getSetting('pin');
    if(p)setSavedPin(p);else setPmode('create');
    const cl=await db.getClients();
    setClients(cl);
    setLoading(false);
  })();},[]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(''),2500);};

  async function persist(list){
    setClients(list);
  }
  async function persistOne(client){
    await db.upsertClient(client);
    const cl=await db.getClients();
    setClients(cl);
  }

  function doPin(){
    if(pmode==='create'){if(pin.length<4){setPErr('Min 4 chars');return;}if(pin!==pin2){setPErr('PINs do not match');return;}db.setSetting('pin',pin);setSavedPin(pin);setLocked(false);}
    else{if(pin===savedPin){setLocked(false);setPErr('');}else{setPErr('Incorrect PIN');setPin('');}}
  }

  const goBack=()=>{setView('dash');setEd(null);setDet(null);};
  const startNew=()=>{setEd(blank());setTab(0);setView('form');};
  const startEdit=c=>{setEd(JSON.parse(JSON.stringify(c)));setTab(0);setView('form');};
  const openDet=c=>{setDet(c);setView('detail');};

  async function saveEd(){
    if(!ed.basics.clientName&&!ed.basics.brandName){alert('Please enter a client or brand name.');setTab(0);return;}
    setSaving(true);
    const u={...ed,updatedAt:new Date().toISOString()};
    await db.upsertClient(u);
    const cl=await db.getClients();
    setClients(cl);
    setSaving(false);
    const isExisting=clients.some(c=>c.id===u.id);
    showToast(isExisting?'Client brief updated ✓':'New client saved ✓');
    goBack();
  }

  async function delClient(id){
    if(!confirm('Delete this client brief? Cannot be undone.'))return;
    await db.deleteClient(id);
    const cl=await db.getClients();
    setClients(cl);
    goBack();
  }

  async function exportAll(){
    const b=new Blob([JSON.stringify(clients,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='omniraai-clients-backup.json';a.click();URL.revokeObjectURL(u);
  }

  const sf=(s,f,v)=>setEd(p=>({...p,[s]:{...p[s],[f]:v}}));
  const sfC=(w,f,v)=>setEd(p=>({...p,basics:{...p.basics,[w]:{...p.basics[w],[f]:v}}}));
  const sfH=(f,v)=>setEd(p=>({...p,basics:{...p.basics,socialHandles:{...p.basics.socialHandles,[f]:v}}}));
  const addTag=(s,f,v)=>{const a=ed[s][f]||[];if(!a.includes(v))sf(s,f,[...a,v]);};
  const rmTag=(s,f,i)=>{const a=[...(ed[s][f]||[])];a.splice(i,1);sf(s,f,a);};
  const togArr=(s,f,v)=>{const a=ed[s][f]||[];sf(s,f,a.includes(v)?a.filter(x=>x!==v):[...a,v]);};
  const addProd=()=>setEd(p=>({...p,products:[...p.products,{id:uid(),name:'',description:'',price:'',usp:'',salesChannels:[],onlineLinks:[],storeLocations:[]}]}));
  const updProd=(i,f,v)=>{const ps=[...ed.products];ps[i]={...ps[i],[f]:v};setEd(p=>({...p,products:ps}));};
  const togProd=(i,f,v)=>{const ps=[...ed.products];const a=ps[i][f]||[];ps[i]={...ps[i],[f]:a.includes(v)?a.filter(x=>x!==v):[...a,v]};setEd(p=>({...p,products:ps}));};
  const addProdTag=(i,f,v)=>{const ps=[...ed.products];const a=ps[i][f]||[];if(!a.includes(v)){ps[i]={...ps[i],[f]:[...a,v]};setEd(p=>({...p,products:ps}));}};
  const rmProdTag=(i,f,j)=>{const ps=[...ed.products];const a=[...(ps[i][f]||[])];a.splice(j,1);ps[i]={...ps[i],[f]:a};setEd(p=>({...p,products:ps}));};
  const rmProd=i=>{const ps=[...ed.products];ps.splice(i,1);setEd(p=>({...p,products:ps}));};

  function exportJson(c){return JSON.stringify({
    client_id:c.id,generated_at:new Date().toISOString(),brand_name:c.basics.brandName||c.basics.clientName,
    industry:c.basics.industry==='Other'?c.basics.industryOther:c.basics.industry,status:c.status,
    company:{name:c.basics.clientName,address:c.basics.companyAddress,website:c.basics.website,nature_of_business:c.basics.natureOfBusiness,products_services:c.basics.productsServicesDesc,parent_company:c.basics.parentCompany,related_brands:c.basics.relatedClientTags,social_handles:c.basics.socialHandles},
    contacts:{primary:c.basics.primaryContact,secondary:c.basics.secondaryContact},
    brand_brief:{tagline:c.voice.tagline,brand_colors:c.voice.colors,personality:c.voice.personality,archetype:c.voice.archetype,voice_tone:c.voice.tones,writing_style:c.voice.writingStyle,dos:c.voice.dos,donts:c.voice.donts,sample_copy:c.voice.sampleCopy,brand_ci_url:c.voice.brandCIUrl,sample_creative_urls:c.voice.sampleCreativeUrls},
    target_audience:{description:c.audience.description,age_ranges:c.audience.ageRanges,gender:c.audience.gender,country:c.audience.countryLocation,malaysia_states:c.audience.malaysiaStates,income_ranges:c.audience.incomeRanges,interests:c.audience.interests,pain_points:c.audience.painPoints,motivations:c.audience.motivations,buying_behavior:c.audience.behavior},
    products:c.products,
    distribution:{active_platforms:c.platforms.active,posting_frequency:c.platforms.frequency,content_formats:c.platforms.formats},
    key_messaging:{main_usp:c.messaging.usp,key_messages:c.messaging.keyMessages,competitors:[...(c.basics.competitorBrands||[]),...(c.messaging.competitors||[])],differentiation:c.messaging.differentiation,primary_cta:c.messaging.cta}
  },null,2);}

  async function copyJson(c){try{await navigator.clipboard.writeText(exportJson(c));setCopied(true);setTimeout(()=>setCopied(false),2500);showToast('JSON copied ✓');}catch{alert('Select and copy the JSON manually.');}}

  const G={display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px 20px'};
  const isEditing=ed&&clients.some(c=>c.id===ed.id);
  const fil=clients.filter(c=>{const n=(c.basics.brandName||c.basics.clientName||'').toLowerCase();return n.includes(srch.toLowerCase())&&(sfilt==='all'||c.status===sfilt);});

  function renderTab(){
    if(!ed)return null;
    if(tab===0)return html`<div>
      <${Sec} t="Business information">
        <div style=${G}>
          <${Fd} label="Client / company name"><input style=${inp()} value=${ed.basics.clientName} onChange=${e=>sf('basics','clientName',e.target.value)} placeholder="e.g. FreshBrew Sdn Bhd"/></${Fd}>
          <${Fd} label="Brand name"><input style=${inp()} value=${ed.basics.brandName} onChange=${e=>sf('basics','brandName',e.target.value)} placeholder="e.g. FreshBrew"/></${Fd}>
          <${Fd} label="Industry">
            <select style=${inp()} value=${ed.basics.industry} onChange=${e=>sf('basics','industry',e.target.value)}><option value="">Select…</option>${INDUSTRIES.map(i=>html`<option key=${i} value=${i}>${i}</option>`)}</select>
            ${ed.basics.industry==='Other'&&html`<input style=${inp({marginTop:8})} value=${ed.basics.industryOther} onChange=${e=>sf('basics','industryOther',e.target.value)} placeholder="Please describe your industry…"/>`}
          </${Fd}>
          <${Fd} label="Status"><select style=${inp()} value=${ed.status} onChange=${e=>setEd(p=>({...p,status:e.target.value}))}><option value="onboarding">Onboarding</option><option value="active">Active</option><option value="paused">Paused</option><option value="deactivated">Deactivated</option></select></${Fd}>
          <${Fd} label="Monthly retainer (RM)"><input style=${inp()} type="number" value=${ed.basics.retainerRM} onChange=${e=>sf('basics','retainerRM',e.target.value)} placeholder="e.g. 3500"/></${Fd}>
          <${Fd} label="Website"><input style=${inp()} value=${ed.basics.website} onChange=${e=>sf('basics','website',e.target.value)} placeholder="https://…"/></${Fd}>
          <${Fd} label="Nature of business" span2><textarea style=${inp({resize:'vertical',minHeight:72})} value=${ed.basics.natureOfBusiness} onChange=${e=>sf('basics','natureOfBusiness',e.target.value)} placeholder="Describe what this company does, its business model…"/></${Fd}>
          <${Fd} label="Products / services / brands overview" span2><textarea style=${inp({resize:'vertical',minHeight:72})} value=${ed.basics.productsServicesDesc} onChange=${e=>sf('basics','productsServicesDesc',e.target.value)} placeholder="Overview of all products, services, or sub-brands…"/></${Fd}>
          <${Fd} label="Company address" span2><textarea style=${inp({resize:'vertical',minHeight:56})} value=${ed.basics.companyAddress} onChange=${e=>sf('basics','companyAddress',e.target.value)} placeholder="Registered or main operating address…"/></${Fd}>
        </div>
      </${Sec}>
      <${Sec} t="Brand grouping & competitors">
        <div style=${G}>
          <${Fd} label="Parent company / holding group"><input style=${inp()} value=${ed.basics.parentCompany} onChange=${e=>sf('basics','parentCompany',e.target.value)} placeholder="e.g. Berjaya Corporation…"/></${Fd}>
          <${Fd} label="Related brands / sister companies"><${TagInput} tags=${ed.basics.relatedClientTags} onAdd=${v=>addTag('basics','relatedClientTags',v)} onRemove=${i=>rmTag('basics','relatedClientTags',i)} placeholder="e.g. Sub-brand X…"/></${Fd}>
          <${Fd} label="Competitor brands" span2><${TagInput} tags=${ed.basics.competitorBrands} onAdd=${v=>addTag('basics','competitorBrands',v)} onRemove=${i=>rmTag('basics','competitorBrands',i)} placeholder="e.g. BrandX, CompetitorY…"/></${Fd}>
        </div>
      </${Sec}>
      <${Sec} t="Social media & marketplace handles">
        <div style=${G}>
          <${Fd} label="Instagram"><input style=${inp()} value=${ed.basics.socialHandles.instagram} onChange=${e=>sfH('instagram',e.target.value)} placeholder="@username or URL"/></${Fd}>
          <${Fd} label="TikTok"><input style=${inp()} value=${ed.basics.socialHandles.tiktok} onChange=${e=>sfH('tiktok',e.target.value)} placeholder="@username or URL"/></${Fd}>
          <${Fd} label="Facebook"><input style=${inp()} value=${ed.basics.socialHandles.facebook} onChange=${e=>sfH('facebook',e.target.value)} placeholder="Page name or URL"/></${Fd}>
          <${Fd} label="LinkedIn"><input style=${inp()} value=${ed.basics.socialHandles.linkedin} onChange=${e=>sfH('linkedin',e.target.value)} placeholder="Page URL"/></${Fd}>
          <${Fd} label="Shopee store"><input style=${inp()} value=${ed.basics.socialHandles.shopee} onChange=${e=>sfH('shopee',e.target.value)} placeholder="Shopee store URL"/></${Fd}>
          <${Fd} label="Lazada store"><input style=${inp()} value=${ed.basics.socialHandles.lazada} onChange=${e=>sfH('lazada',e.target.value)} placeholder="Lazada store URL"/></${Fd}>
        </div>
      </${Sec}>
      <${Sec} t="Primary contact">
        <div style=${G}>
          <${Fd} label="Full name"><input style=${inp()} value=${ed.basics.primaryContact.name} onChange=${e=>sfC('primaryContact','name',e.target.value)} placeholder="e.g. Amirul Hakim"/></${Fd}>
          <${Fd} label="Role / title"><input style=${inp()} value=${ed.basics.primaryContact.role} onChange=${e=>sfC('primaryContact','role',e.target.value)} placeholder="e.g. Founder"/></${Fd}>
          <${Fd} label="Email"><input style=${inp()} value=${ed.basics.primaryContact.email} onChange=${e=>sfC('primaryContact','email',e.target.value)} placeholder="email@company.com"/></${Fd}>
          <${Fd} label="Phone"><input style=${inp()} value=${ed.basics.primaryContact.phone} onChange=${e=>sfC('primaryContact','phone',e.target.value)} placeholder="+60 12-XXX XXXX"/></${Fd}>

        <div style=${{width:56,height:56,borderRadius:14,background:`linear-gradient(135deg,${(det.voice?.colors||['#4a86f5'])[0]},${(det.voice?.colors||[])[1]||C.pu})`,flexShrink:0}}/>
        <div style=${{flex:1}}><div style=${{fontSize:22,fontWeight:700,color:C.tx}}>${det.basics.brandName||det.basics.clientName}</div><div style=${{fontSize:13,color:C.dm,marginTop:2}}>${det.basics.industry==='Other'?det.basics.industryOther:det.basics.industry}</div></div>
        <div style=${{textAlign:'right'}}><${SBadge} status=${det.status}/>${det.basics.retainerRM&&html`<div style=${{fontSize:13,color:C.ok,marginTop:5}}>RM ${parseInt(det.basics.retainerRM).toLocaleString()}/mo</div>`}<div style=${{fontSize:11,color:C.mt,marginTop:4}}>Updated ${fmtd(det.updatedAt)}</div></div>
      </div>
      <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        <div style=${{background:C.s1,border:`0.5px solid ${C.bd}`,borderRadius:10,padding:18}}>
          <${Sec} t="Contacts"><${Row} l="Primary" v=${det.basics.primaryContact?.name}/><${Row} l="Email" v=${det.basics.primaryContact?.email}/><${Row} l="Phone" v=${det.basics.primaryContact?.phone}/><${Row} l="Website" v=${det.basics.website}/></${Sec}>
          <${Sec} t="Brand identity"><${Row} l="Tagline" v=${det.voice.tagline}/><${Row} l="Archetype" v=${det.voice.archetype}/><div style=${{display:'flex',gap:5,marginTop:6}}>${(det.voice.colors||[]).map((c,i)=>html`<div key=${i} style=${{width:22,height:22,borderRadius:6,background:c,border:`1px solid ${C.bd}`}}/>`)}</div></${Sec}>
        </div>
        <div style=${{background:C.s1,border:`0.5px solid ${C.bd}`,borderRadius:10,padding:18}}>
          <${Sec} t="Voice & tone"><div style=${{marginBottom:8}}><div style=${{color:C.dm,fontSize:12,marginBottom:4}}>Tone</div><${Tags} items=${det.voice.tones}/></div><div style=${{marginBottom:8}}><div style=${{color:C.dm,fontSize:12,marginBottom:4}}>Personality</div><${Tags} items=${det.voice.personality}/></div><${Row} l="Archetype" v=${det.voice.archetype}/></${Sec}>
          <${Sec} t="Target audience"><div style=${{marginBottom:8}}><div style=${{color:C.dm,fontSize:12,marginBottom:4}}>Age ranges</div><${Tags} items=${det.audience.ageRanges}/></div><${Row} l="Location" v=${det.audience.countryLocation}/><div style=${{marginBottom:8}}><div style=${{color:C.dm,fontSize:12,marginBottom:4}}>Income</div><${Tags} items=${det.audience.incomeRanges}/></div></${Sec}>
        </div>
      </div>
      <div style=${{background:C.s1,border:`0.5px solid ${C.ac}35`,borderRadius:10,padding:20,background:`${C.ac}06`}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div><div style=${{fontSize:14,fontWeight:600,color:C.tx,marginBottom:3}}>n8n JSON Export</div><div style=${{fontSize:12,color:C.dm}}>Client ID: <code style=${{background:C.s3,padding:'1px 6px',borderRadius:3,color:C.ac,fontSize:11}}>${det.id}</code></div></div>
          <button onClick=${()=>copyJson(det)} style=${pbtn(true,{fontSize:12,padding:'6px 14px'})}>${copied?'✓ Copied!':'Copy JSON'}</button>
        </div>
        <div style=${{background:C.bg,border:`0.5px solid ${C.bd}`,borderRadius:6,padding:14,maxHeight:200,overflowY:'auto'}}><pre style=${{margin:0,fontSize:11,color:C.dm,fontFamily:'monospace',lineHeight:1.7,whiteSpace:'pre-wrap',wordBreak:'break-word'}}>${exportJson(det)}</pre></div>
      </div>
    </div>`;

  return html`
    <div style=${{minHeight:'100vh',background:C.bg,color:C.tx}}>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      ${hdr}
      <div style=${{paddingBottom:48}}>${view==='dash'&&dash}${view==='form'&&form}${view==='detail'&&detail}</div>
      ${toast&&html`<div style=${{position:'fixed',bottom:24,right:24,background:C.s1,border:`1px solid ${C.ac}50`,borderRadius:8,padding:'10px 18px',fontSize:13,color:C.tx,zIndex:999}}>${toast}</div>`}
    </div>`;
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
